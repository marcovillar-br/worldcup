# Hooks locais antes do commit: ruff (lint + format). Instale com `uv run pre-commit install`.
# O type checking (mypy) e os testes rodam no CI — aqui ficam só as checagens rápidas.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      # Aviso (não bloqueia): fixtures.csv mudou sem atualizar o diário de campanha (BOLAO.md).
      # Regra de sincronia de artefatos no AGENTS.md, "Convenções e cuidados".
      - id: bolao-sync
        name: "aviso: fixtures.csv sem BOLAO.md"
        language: system
        files: ^data/editions/[^/]+/fixtures\.csv$
        verbose: true
        entry: bash -c 'for f in "$@"; do d=$(dirname "$f"); git diff --cached --name-only | grep -qx "$d/BOLAO.md" || echo "⚠️  $f mudou sem atualizar $d/BOLAO.md (Estado atual)."; done' --
      # Bloqueia: integridade do backlog (IDs únicos, índice↔detalhe, status casado, ✅⇒commit).
      # Lógica em scripts/check_backlog.py; dinâmica de registro/resolução na skill `backlog`.
      - id: backlog-integrity
        name: "integridade do BACKLOG.md"
        language: system
        files: ^docs/BACKLOG\.md$
        entry: python3 scripts/check_backlog.py
