# Configuração de pontuação do bolão (escolha do admin do grupo).
# Default deste grupo: Sistema I (probabilístico) + peso "Equilíbrio gradual".
# Edite para casar com o seu grupo se for diferente.

# Sistema de pontos: "sistema_i" | "simplificado" | "so_vencedor"
system = "sistema_i"

# Nível de risco da ESTRATÉGIA (só na escolha do palpite, não na régua de pontos do app).
# best_prediction maximiza E[pontos] · (1/P(resultado))^(2·risk−1):
# 0.5 = fiel (maximiza pontos esperados puro); >0.5 = arrisca mais zebras (útil para subir no
# ranking quando está atrás); <0.5 = conservador (tende ao favorito). Default fiel = 0.5.
risk = 0.5

# Peso do mercado no blend com odds.csv (ENG-19). Prior original 0.6; elevado a 0.8 em 2026-07-02
# com dado (ENG-38): `blend-track --sweep` em 49 jogos disputados com odds deu Brier MONOTÔNICO
# decrescente em w (0.4420 no modelo-puro → 0.4100 em w=1.0). 0.8 captura a maior parte do ganho
# sem abraçar o extremo w*=1.0 numa amostra pequena. Efetivo SÓ nos jogos presentes em odds.csv
# (ausente ⇒ só modelo). Reavalie com `blend-track --sweep` conforme a amostra crescer.
blend_weight = 0.8

# Peso por fase (Equilíbrio gradual): grupos 1x, eliminatórias 2x, final 4x.
# Não muda o placar ótimo de um jogo isolado, mas indica onde arriscar mais decide o ranking.
[phase_weights]
group = 1.0
R32 = 2.0
R16 = 2.0
QF = 2.0
SF = 2.0
"3rd_place" = 2.0
final = 4.0

# Parâmetros do Sistema I ("O mais justo e equilibrado"), valores oficiais do app.
# Pontos base variam com a probabilidade do resultado (1 a 13). Os níveis de acerto de placar são
# HIERÁRQUICOS, não cumulativos: o app concede só o MAIOR atingido — exato(5) > gols_vencedor(3) >
# saldo(2) > gols_perdedor(1). A goleada(1) empilha como extra. (Ver docs/SPEC.md §4.)
[sistema_i]
base_min = 1.0          # pontos base mínimos (favorito óbvio)
base_max = 13.0         # pontos base máximos (zebra acertada)
base_log_coeff = 7.55   # curva base = 1 + a·log10(1/p), calibrada ao Simulador do app (a≈7.55)
exact = 5.0          # +5 placar exato
winner_goals = 3.0   # +3 acertar os gols do vencedor ("Placar Vencedor")
goal_diff = 2.0      # +2 acertar a diferença de gols (saldo)
loser_goals = 1.0    # +1 acertar os gols do perdedor
goleada = 1.0        # +1 acertar uma goleada (margem >= 3)
extra_time = 3.0     # +3 acertar a prorrogação (mata-mata)
penalties = 3.0      # +3 acertar os pênaltis (mata-mata)
max_goals = 6        # placar máximo considerado na otimização (0..6 gols por lado)

# Parâmetros do sistema simplificado (pontos fixos), caso o seu grupo use este.
[simplificado]
winner = 10.0        # acertou o vencedor/empate
exact = 18.0         # cravou o placar
diff_bonus = 3.0     # acertou o saldo (sem cravar)
max_goals = 6
